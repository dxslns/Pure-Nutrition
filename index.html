<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pure Nutrition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.css" />



    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 1100px;
            background-image: url('./pic2.png'); /* Замените на URL вашего изображения */
            background-size: cover; /* Изображение будет растянуто, чтобы покрыть весь экран */
            background-position: center; /* Центрирует изображение */
            background-repeat: no-repeat;
        }

        header {
            background-color: #000000;
            color: #ffffff;
            width: 100%;
            text-align: center;
            padding: 20px 0;
        }

        main {
            margin: 20px;
            text-align: center;
        }

        .search-container {
            margin: 20px 20px;
        }

        input[type="text"] {
            font-size: 20px;
            padding: 10px;
            width: 340px;
            height: 40px;
            border: 0px solid #000000;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        input:focus, textarea:focus, select:focus {
            outline: none; /* Убирает обводку */
        }

        button {
            padding: 20px 25px;
            border: none;
            background-color: #000000;
            color: #ffffff;
            border-radius: 15px;
            cursor: pointer;
            margin: 10px;
        }

            button:hover {
                background-color: #444444;
            }

        .banners {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .banner {
            background-color: black;
            color: white;
            border: 2px solid #000000;
            padding: 15px;
            margin: 10px 0;
            width: 340px;
            height: 0%;
            border-radius: 20px;
            transition: background-color 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

            .banner:hover {
                background-color: dimgray;
            }

        .banner2 {
            background-color: rgba(255, 255, 255, 0);
            backdrop-filter: blur(px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            color: black;
            border: 5px solid #000000;
            padding: 15px;
            margin: 10px 0;
            width: 340px;
            height: 0%;
            border-radius: 20px;
        }

            .banner2:hover {
                background-color: dimgray;
            }

        .article {
            display: none; /* Скрываем статьи по умолчанию */
        }

            .article.visible {
                display: block; /* Показываем статьи, если они имеют класс 'visible' */
            }

        footer {
            background: black; /* Черный цвет */
            color: #ffffff; /* Белый текст */
            text-align: center;
            padding: 20px;
            position: relative;
            bottom: 0;
            top: 0px;
            width: 90.5%;
            height: 400px;
        }
    </style>

</head>
<body>

    <header>
        <h1>Pure Nutrition</h1>
    </header>
    <main>
        <div class="search-container">
            <input type="text" id="search" placeholder="Search..." onkeyup="searchFunction()">

        </div>

        <div id="content">
            <button class="article" onclick="window.location.href='page2.html'">Beef</button>
            <button class="article" onclick="window.location.href='page3.html'">Date </button>
            <button class="article" onclick="window.location.href='page4.html'">Chicken</button>
            <!-- Добавьте больше статей по мере необходимости -->
        </div>

        <script>
            function showArticles() {
                const articles = document.getElementsByClassName('article');
                for (let i = 0; i < articles.length; i++) {
                    articles[i].classList.add('visible'); // Добавляем класс 'visible' для показа статей
                }
            }

            function searchFunction() {
                const input = document.getElementById('search');
                const filter = input.value.toLowerCase();
                const articles = document.getElementsByClassName('article');

                if (filter === "") {
                    // Если поле ввода пустое, скрываем все статьи
                    for (let i = 0; i < articles.length; i++) {
                        articles[i].classList.remove('visible'); // Убираем класс 'visible'
                    }
                    return; // Выходим из функции
                }

                for (let i = 0; i < articles.length; i++) {
                    const article = articles[i];
                    if (article.innerText.toLowerCase().includes(filter)) {
                        article.classList.add('visible'); // Показываем элемент
                    } else {
                        article.classList.remove('visible'); // Скрываем элемент
                    }
                }
            }
        </script>

        <div class="banners">
            <div class="banner" data-aos="fade-left" onclick="window.location.href='page3.html'"><h1>Categories</h1></div>
            <div class="banner2" data-aos="fade-right" onclick="window.location.href='page3.html'"><h1>Compare</h1></div>
            <div class="banner" data-aos="fade-left" onclick="window.location.href='page3.html'"><h1>History</h1></div>
            <div class="banner2" data-aos="fade-right" onclick="window.location.href='page3.html'"><h1>Saved</h1></div>

        </div>
    </main>

    <footer>
        <p>&copy; 2025 Pure Nutrition. Minaev Nikita 10D 1363.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.js"></script>
    <script>
        AOS.init();
    </script>

</body>
</html>
